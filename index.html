    // ─── FILE MAP ────────────────────────────────────────────
    // type: 'md'   → fetched and rendered as Markdown
    // type: 'html' → fetched and injected as raw HTML
    const SECTIONS = {
      about:     { type: 'md',   file: 'about/index.md' },
      work:      { type: 'html', file: 'work/selected-work.html' },
      learnings: { type: 'md',   file: 'learnings/index.md' },
      topic1:    { type: 'md',   file: 'topic1/index.md' },
      topic2:    { type: 'md',   file: 'topic2/index.md' },
    };

    // ─── ELEMENTS ────────────────────────────────────────────
    const contentEl  = document.getElementById('md-content');
    const contentCol = document.getElementById('content-col');
    let currentSection = null;

    // ─── LOAD SECTION ────────────────────────────────────────
    async function loadSection(section) {
      if (section === currentSection) return;
      currentSection = section;

      document.querySelectorAll('.nav-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.section === section));

      const cfg = SECTIONS[section];

      // ── HTML section → fetch and inject into content div ──
      if (cfg && cfg.type === 'html') {
        try {
          const res = await fetch(cfg.file);
          if (!res.ok) throw new Error('fetch failed');
          const html = await res.text();
          // Extract <body> content and inject it; also pull <style> blocks
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');

          // Inject any <style> tags from the fetched page (scoped to avoid conflicts)
          let styles = '';
          doc.querySelectorAll('style').forEach(s => { styles += s.outerHTML; });

          // Get the body content
          const body = doc.body.innerHTML;

          // Remove existing injected styles
          document.querySelectorAll('style[data-injected]').forEach(s => s.remove());

          // Add styles
          if (styles) {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = styles;
            wrapper.querySelectorAll('style').forEach(s => {
              s.setAttribute('data-injected', '1');
              document.head.appendChild(s);
            });
          }

          // Derive base folder of the fetched HTML file
          // e.g. 'work/selected-work.html' -> 'work/'
          const baseFolder = cfg.file.includes('/')
            ? cfg.file.substring(0, cfg.file.lastIndexOf('/') + 1)
            : '';

          // Rewrite relative src/href so they resolve from the repo root.
          // e.g. src="images/vf1.jpg" -> src="work/images/vf1.jpg"
          // Skips absolute URLs (http/https/data) and root-relative paths (/).
          const fixedBody = body.replace(
            /(\s(?:src|href))="(?!https?:\/\/|\/|data:)([^"]+)"/gi,
            (_, attr, path) => `${attr}="${baseFolder}${path}"`
          );

          // Inject the fixed HTML (no padding — the HTML page owns its layout)
          contentEl.className = 'html-section';
          contentEl.innerHTML = fixedBody;

          // Re-execute any <script> blocks inside the injected content
          contentEl.querySelectorAll('script').forEach(old => {
            const s = document.createElement('script');
            s.textContent = old.textContent;
            old.replaceWith(s);
          });

        } catch {
          // Fallback: show a message if fetch fails (e.g. opened as file://)
          contentEl.className = 'md-body';
          contentEl.innerHTML = `
            <div style="padding:3rem;text-align:center;color:var(--muted)">
              <p style="font-size:1rem;margin-bottom:1rem">📂 Selected Work</p>
              <p style="font-size:.85rem;margin-bottom:1.5rem">
                Open this portfolio with a local server or on GitHub Pages to view the full Selected Work page.
              </p>
              <a href="work/selected-work.html" style="color:var(--teal);font-size:.85rem">
                → Open Selected Work directly
              </a>
            </div>`;
        }
        return;
      }

      // ── Markdown section ──
      contentEl.className = 'md-body';
      // Remove any previously injected styles
      document.querySelectorAll('style[data-injected]').forEach(s => s.remove());

      try {
        const res = await fetch(cfg.file);
        if (!res.ok) throw new Error('fetch failed');
        renderMarkdown(await res.text());
      } catch {
        renderMarkdown(EMBEDDED[section] || '# Not found');
      }
    }

    // ─── MARKDOWN HELPERS ────────────────────────────────────
    function renderMarkdown(mdText) {
      contentEl.innerHTML = marked.parse(mdText);
      contentEl.querySelectorAll('a[href^="http"]').forEach(a => {
        a.target = '_blank'; a.rel = 'noopener noreferrer';
      });
      contentEl.querySelectorAll('a[href$=".md"]').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          const href = a.getAttribute('href');
          loadMdFile(SECTIONS[currentSection].file.replace('index.md', '') + href.replace('./', ''));
        });
      });
      contentEl.querySelectorAll('a[href^="#"]').forEach(a => {
        const sec = a.getAttribute('href').replace('#', '');
        if (SECTIONS[sec]) {
          a.addEventListener('click', e => { e.preventDefault(); loadSection(sec); });
        }
      });
    }

    async function loadMdFile(path) {
      contentEl.innerHTML = '<div class="loader">Loading…</div>';
      try {
        const res = await fetch(path);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        contentEl.innerHTML =
          `<button class="back-btn" onclick="loadSection('${currentSection}')">← Back</button>` +
          marked.parse(await res.text());
      } catch (err) {
        contentEl.innerHTML = `<p class="error">Could not load file (${err.message})</p>`;
      }
    }

    // ─── NAV ─────────────────────────────────────────────────
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        history.replaceState(null, '', '#' + btn.dataset.section);
        loadSection(btn.dataset.section);
      });
    });

    window.addEventListener('hashchange', () => {
      const sec = location.hash.replace('#', '') || 'about';
      if (SECTIONS[sec]) loadSection(sec);
    });

    // ─── BOOT ─────────────────────────────────────────────────
    const initSec = location.hash.replace('#', '') || 'about';
    loadSection(SECTIONS[initSec] ? initSec : 'about');
  </script>
